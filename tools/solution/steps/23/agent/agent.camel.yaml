- route:
    id: rocketchat-to-agent
    description: RocketChat to Agent
    from:
      description: RocketChat
      uri: platform-http
      parameters:
        path: /ai-support
      steps:
        - step:
            id: step-2056
            steps:
              - setBody:
                  constant: >
                    {"text":"Here's your invoice data:\n\n**Invoice Number:**
                    61356293\n**Date of Issue:** 20120906\n\n**Seller:**\n-
                    Name: Georgia World Congress Center\n- Address: 285 Andrew
                    Young International Blvd NW, Atlanta, Georgia, GA 30313\n-
                    Tax ID: 939988477\n- IBAN:
                    GB50ACIE59715038217063\n\n**Client:**\n- Name: Chapman, Kim
                    and Green\n- Address: 64731 James Branch, Smithmouth, NC,
                    26872\n- Tax ID: 949849105\n\n**Items:**\n- Item 1:\n  -
                    Product ID: WINEGLASS01\n  - Description: Wine Glasses
                    Goblets Pair Clear Glass\n  - Quantity: 5\n  - Unit of
                    Measure: Each\n  - Net Price: $12\n  - Net Worth: $60\n  -
                    VAT Percentage: 10%\n  - Gross Worth: $66\n\n**Summary:**\n-
                    VAT Percentage: 10%\n- Net Worth: $192.81\n- VAT Amount:
                    $19.28\n- Gross Worth: $212.09"}
              - stop:
                  id: stop-3482
            disabled: true
        - setBody:
            description: get text
            jq:
              expression: .text
              resultType: String
        - setHeaders:
            id: setHeaders-3420
            description: set system prompt
            disabled: false
            headers:
              - language:
                  expression: resource:system.message
                  language: simple
                name: CamelLangChain4jAgentSystemMessage
              - name: CamelLangChain4jAgentMemoryId
                simple:
                  expression: "1"
        - step:
            id: step-9559
            description: "To do: Agent"
            steps:
              - to:
                  id: to-1056
                  uri: langchain4j-agent
                  parameters:
                    agentId: myagent
                    agent: "#myagent"
                    tags: all
        - log:
            id: log-1512
            message: Agent response:\n${body}
        - to:
            id: to-4252
            uri: log
            parameters:
              loggerName: InfoLogger
              showAll: true
        - to:
            id: to-1223
            description: to rocketchat
            uri: direct
            parameters:
              name: to-rocketchat
- route:
    id: tool-retrieve-pdf
    description: Retrieves the PDF url of an invoice
    from:
      uri: langchain4j-tools
      parameters:
        description: Retrieves the PDF url of an invoice
        parameter.id: string
        tags: all
        toolId: getInvoicePDFurl
      steps:
        - setVariable:
            description: set file name
            expression:
              simple:
                expression: invoice_${header.id}.pdf
            name: filename
        - to:
            id: to-1810
            uri: direct
            parameters:
              name: get-pdf-url
- route:
    id: get-pdf-url
    description: Retrieves the PDF url of an invoice
    from:
      id: from-1873
      uri: direct
      parameters:
        name: get-pdf-url
      steps:
        - removeHeaders:
            disabled: false
            pattern: "*"
        - to:
            uri: aws2-s3
            parameters:
              amazonS3Presigner: "#presigner"
              autoCreateBucket: true
              bucketNameOrArn: invoices
              forcePathStyle: true
              keyName: ${variable.filename}
              operation: createDownloadLink
              overrideEndpoint: true
              region: us-east-1
        - setBody:
            simple:
              expression: ${replace('4566','4566/invoices')}
        - log:
            id: log-2643-4075
            message: "link: ${body}"
- route:
    id: to-rocketchat
    description: to-rocketchat
    from:
      id: from-1791
      uri: direct
      parameters:
        name: to-rocketchat
      steps:
        - unmarshal:
            disabled: false
            json: {}
        - marshal:
            disabled: false
            json: {}
- route:
    id: tool-amend-invoice
    description: Amend invoice
    from:
      uri: langchain4j-tools
      parameters:
        description: Amends an invoice
        parameter.id: string
        parameter.prompt: string
        tags: all
        toolId: amendInvoice
      steps:
        - step:
            id: step-3889
            description: normal flow
            steps:
              - setVariable:
                  description: set file name
                  expression:
                    simple:
                      expression: invoice_${header.id}.pdf
                  name: filename
              - to:
                  id: to-1810-2640
                  uri: direct
                  parameters:
                    name: get-invoice-data
              - setBody:
                  id: setBody-4119
                  simple:
                    expression: |-
                      ${header.prompt}

                      ${body}
              - setHeaders:
                  id: setHeaders-3420-2534
                  description: set system prompt
                  disabled: false
                  headers:
                    - language:
                        expression: resource:prompt.amend
                        language: simple
                      name: CamelLangChain4jAgentSystemMessage
                    - name: CamelLangChain4jAgentMemoryId
                      simple:
                        expression: "1"
              - to:
                  id: to-2739
                  uri: langchain4j-agent
                  parameters:
                    agentId: amend
                    agent: "#amend"
              - setBody:
                  id: setBody-1842
                  simple:
                    expression: ${body.trim()}
              - log:
                  id: log-1389
                  message: ${body}
              - to:
                  id: to-1542
                  uri: direct
                  parameters:
                    name: store-pdf-s3
              - setBody:
                  id: setBody-3423
                  simple:
                    expression: done
            disabled: false
- route:
    id: get-invoice-data
    description: get-invoice-data
    from:
      id: from-1847
      uri: direct
      parameters:
        name: get-invoice-data
      steps:
        - convertHeaderTo:
            id: convertHeaderTo-9760
            name: id
            type: String
        - to:
            id: to-1530
            uri: sql
            parameters:
              query: select data from invoices where id = :#${header.id}
        - setBody:
            id: setBody-1160
            simple:
              expression: ${body[0]}
            disabled: true
        - unmarshal:
            id: unmarshal-1434
            jacksonXml: {}
            disabled: true
        - marshal:
            id: marshal-4078
            jacksonXml: {}
            disabled: true
        - log:
            id: log-1096
            message: ${body}
- route:
    id: tool-get-data
    description: Get invoice data
    from:
      id: tool-get-data
      uri: langchain4j-tools
      parameters:
        description: Obtains data about an invoice from the database
        parameter.id: string
        tags: all
        toolId: getInvoiceData
      steps:
        - to:
            id: to-1810-2640-3288
            uri: direct
            parameters:
              name: get-invoice-data
- route:
    id: tool-create-ticket
    description: Creates a ticket in HelpDesk
    from:
      id: tool-create-ticket
      uri: langchain4j-tools
      parameters:
        description: Creates an issue or ticket in the HelpDesk system
        parameter.subject: string
        parameter.content: string
        tags: all
        toolId: createTicket
      steps:        
        - setBody:
            simple: >-
              {
                "subject": "${header.subject}",
                "issue": "${header.content}"
              }
            description: set JSON call
        - to:
            uri: kamelet:helpdesk-create-ticket
            parameters:
              username: "{{helpdesk.username}}"
              password: "{{helpdesk.password}}"
              groupId: "{{helpdesk.group.id}}"
              typeId: "{{helpdesk.type.id.issue}}"
              priorityId: "{{helpdesk.priority.id.normal}}"
            description: Create helpdesk ticket
        - log:
            message: "Ticket created"
            description: Log result
- route:
    id: store-pdf-s3
    from:
      uri: direct
      parameters:
        name: store-pdf-s3
      steps:
        - to:
            description: Template PDF
            uri: xslt-saxon
            parameters:
              resourceUri: template-pdf.xsl
        - process:
            description: generate PDF
            ref: InvoiceToPDF
        - to:
            description: store PDF
            uri: aws2-s3
            parameters:
              autoCreateBucket: true
              bucketNameOrArn: invoices
              forcePathStyle: true
              keyName: invoice_${header.id}.pdf
              overrideEndpoint: true
              region: us-east-1
