# Datasource
spring.datasource.url=jdbc:postgresql://postgres:5432/labdb
spring.datasource.driverClassName=org.postgresql.Driver

# Datasource credentials
spring.datasource.username=
spring.datasource.password=

# S3 configuration
camel.component.aws2-s3.accessKey=
camel.component.aws2-s3.secretKey=
camel.component.aws2-s3.uriEndpointOverride=

# Model configuration
forage.myagent.agent.model.kind=openai
forage.myagent.agent.model.name=qwen3-14b
forage.myagent.agent.base.url=https://litellm-prod.apps.maas.redhatworkshops.io/v1
forage.myagent.agent.api.key=PENDING

# Memory settings
forage.myagent.agent.features=memory
forage.myagent.agent.memory.kind=message-window
forage.myagent.agent.memory.max.messages=10

# Log configuration
forage.myagent.agent.log.requests=true
forage.myagent.agent.log.responses=true


# Model configuration
forage.amend.agent.model.kind=openai
forage.amend.agent.model.name=qwen3-14b
forage.amend.agent.base.url=
forage.amend.agent.api.key=

# Helpdesk credentials
helpdesk.username=
helpdesk.password=
helpdesk.group.id=
helpdesk.type.id.issue=
helpdesk.priority.id.normal=
