- route:
    id: route-2799
    description: RocketChat to Agent
    from:
      description: RocketChat
      uri: platform-http
      parameters:
        path: /ai-support
      steps:
        - setBody:
            description: get text
            jq:
              expression: .text
              resultType: String
        - setHeaders:
            id: setHeaders-3420
            description: set system prompt
            disabled: false
            headers:
              - language:
                  expression: resource:system.message
                  language: simple
                name: CamelLangChain4jAgentSystemMessage
              - name: CamelLangChain4jAgentMemoryId
                simple:
                  expression: "1"
        - step:
            id: step-9559
            description: "To do: Agent"
            steps:
              - to:
                  id: to-1056
                  uri: langchain4j-agent
                  parameters:
                    agentId: agent
                    tags: all
        - to:
            id: to-1223
            description: to rocketchat
            uri: direct
            parameters:
              name: to-rocketchat
- route:
    id: route-3215
    description: Retrieves the PDF url of an invoice
    from:
      uri: langchain4j-tools
      parameters:
        description: Retrieves the PDF url of an invoice
        parameter.id: string
        tags: all
        toolId: getInvoicePDFurl
      steps:
        - setVariable:
            description: set file name
            expression:
              simple:
                expression: invoice_${header.id}.pdf
            name: filename
        - to:
            id: to-1810
            uri: direct
            parameters:
              name: get-pdf-url
- route:
    id: route-3215-7260
    description: Retrieves the PDF url of an invoice
    from:
      id: from-1873
      uri: direct
      parameters:
        name: get-pdf-url
      steps:
        - removeHeaders:
            disabled: false
            pattern: "*"
        - to:
            uri: aws2-s3
            parameters:
              amazonS3Presigner: "#presigner"
              autoCreateBucket: true
              bucketNameOrArn: invoices
              forcePathStyle: true
              keyName: ${variable.filename}
              operation: createDownloadLink
              overrideEndpoint: true
              region: us-east-1
        - setBody:
            simple:
              expression: ${replace('4566','4566/invoices')}
        - log:
            id: log-2643-4075
            message: "link: ${body}"
- route:
    id: route-1212
    description: to-rocketchat
    from:
      id: from-1791
      uri: direct
      parameters:
        name: to-rocketchat
      steps:
        - unmarshal:
            disabled: false
            json: {}
        - marshal:
            disabled: false
            json: {}
