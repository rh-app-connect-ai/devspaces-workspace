# Datasource
forage.jdbc.db.kind=postgresql
forage.jdbc.url=jdbc:postgresql://postgres:5432/labdb
forage.jdbc.username=
forage.jdbc.password=

# S3 access
camel.component.aws2-s3.accessKey=
camel.component.aws2-s3.secretKey=
camel.component.aws2-s3.uriEndpointOverride=

# S3 bucket
s3.bucket=user10

# S3 presigner
s3.presigner.access-key=
s3.presigner.secret-key=
s3.presigner.uri=

# Model configuration
forage.myagent.agent.model.kind=openai
forage.myagent.agent.model.name=qwen3-14b
forage.myagent.agent.base.url=
forage.myagent.agent.api.key=

# Memory settings
forage.myagent.agent.features=memory
forage.myagent.agent.memory.kind=message-window
