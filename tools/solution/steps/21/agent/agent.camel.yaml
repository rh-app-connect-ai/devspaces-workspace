- route:
    from:
      uri: direct:agent
      steps:
        - convertBodyTo:
            type: String
        - setHeader:
            id: setHeader-1975-3488
            name: CamelLangChain4jAgentSystemMessage
            simple:
              expression: >-
                /no_think

                You are a helpful assisstant.

                You help updating invoices by analysing the user prompt,
                modifying an existing invoice metadata and updating its content.

                Updating invoices is a multi step process:
                  1) First you obtain the metadata of an invoice
                  2) Then you evaluate and apply the changes requested
                  3) Lastly, you update the invoice metadata


                IMPORTANT:
                - When responding, always do it in JSON format, following one of the patterns listed below.
                - All JSON responses compacted in 1 line (no pretty-print).

                - Pattern 1:

                  When providing URLs to PDFs, please wrap them in the following JSON structure (format in one line):

                      {
                        "text": "Here's your invoice:",
                        "attachments": [
                          {
                            "title": "Invoice <invoice_number> PDF",
                            "title_link": "<invoice_url>",
                            "text": "Click to view or download the PDF (expires in 1 hour)",
                            "color": "#2f9e44"
                          }
                        ]
                      }

                - Pattern 2:

                  Otherwise, use the format that follows (format in one line):

                      {
                        "text": "<your_response>"
                      }

                IMPORTANT: Always compact the JSON response in 1 line (no pretty-print) to avoid new line characters.

                Use the tools that are available to you.
        - setHeader:
            expression:
              simple:
                expression: "1"
            name: CamelLangChain4jAgentMemoryId
        - doTry:
            id: doTry-3539
            steps:
              - to:
                  uri: langchain4j-agent
                  parameters:
                    agent: "#myagent"
                    agentId: test
                    tags: all
            doCatch:
              - id: doCatch-1552
                steps:
                  - setBody:
                      simple:
                        expression: "Oops, something went wrong: ${exception.message} "
                exception:
                  - java.lang.Exception
        # - log: ${body}

        - setBody:
            expression:
              simple: ${body.trim()}

        - unmarshal:
            json: {}

        - marshal:
            json: {}

        - log: ${body}

- route:
    id: route-3215
    description: Retrieves the PDF url of an invoice
    from:
      uri: langchain4j-tools
      parameters:
        description: Retrieves the PDF url of an invoice
        parameter.id: string
        tags: all
        toolId: getInvoicePDFurl
      steps:
        - setVariable:
            description: set file name
            expression:
              simple:
                expression: invoice_${header.id}.pdf
            name: filename
        - to:
            id: to-1810
            uri: direct
            parameters:
              name: get-pdf-url

- route:
    id: route-3215-7260
    description: Retrieves the PDF url of an invoice
    from:
      uri: direct
      parameters:
        name: get-pdf-url
      steps:
        - removeHeaders:
            disabled: false
            pattern: "*"
        - to:
            uri: aws2-s3
            parameters:
              # accessKey: accesskey
              autoCreateBucket: true
              bucketNameOrArn: invoices
              forcePathStyle: true
              keyName: ${variable.filename}
              operation: createDownloadLink
              overrideEndpoint: true
              region: us-east-1
              # secretKey: secretkey
              # uriEndpointOverride: http://localhost:4566
              amazonS3Presigner: "#presigner"

        - setBody:
            simple:
              expression: ${replace('4566','4566/invoices')}
        - log:
            id: log-2643-4075
            message: "link: ${body}"
      id: from-1873

