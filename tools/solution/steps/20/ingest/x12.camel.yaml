- route:
    id: process-po
    from:
      uri: direct
      parameters:
        name: po-main
      steps:
        - setVariable:
            id: setVariable-1059-2881
            description: get invoiceid
            name: invoiceid
            xpath:
              expression: /Invoice/InvoiceNumber/text()
              resultQName: STRING
        - to:
            id: to-8424-9888
            uri: direct
            parameters:
              name: store-db
            disabled: false
        - to:
            description: Template PDF
            uri: xslt-saxon
            parameters:
              resourceUri: template-pdf.xsl
        - process:
            description: generate PDF
            ref: InvoiceToPDF
        - setVariable:
            description: set file name
            expression:
              simple:
                expression: invoice_${variable.invoiceid}.pdf
            name: filename
        - removeHeaders:
            disabled: false
            pattern: "*"
        - setHeader:
            expression:
              simple:
                expression: application/pdf
            name: CamelAwsS3ContentType
        - to:
            uri: aws2-s3
            parameters:
              # accessKey: accesskey
              autoCreateBucket: true
              bucketNameOrArn: invoices
              forcePathStyle: true
              keyName: ${variable.filename}
              overrideEndpoint: true
              region: us-east-1
              # secretKey: secretkey
              # uriEndpointOverride: http://localhost:4566


        # - setHeader:
        #     expression:
        #       simple:
        #         expression: true
        #     name: CamelAwsS3DownloadLinkBrowserCompatible


        - to:
            uri: aws2-s3:invoices
            parameters:
              # accessKey: accesskey
              autoCreateBucket: true
              # bucketNameOrArn: 
              forcePathStyle: true
              keyName: ${variable.filename}
              operation: createDownloadLink
              overrideEndpoint: true
              region: us-east-1
              # secretKey: secretkey
              # uriEndpointOverride: http://localhost:4566
              amazonS3Presigner: "#presigner"
        - log:
            id: log-2643-8739
            message: "link: ${body}"
        # - to:
        #     id: to-3387-1868
        #     uri: file
        #     parameters:
        #       directoryName: invoices
        #       fileName: ${variable.filename}
        #     disabled: false
- route:
    id: service-x12-1496
    from:
      id: from-4095
      uri: direct
      parameters:
        name: process-x12
      steps:
        - unmarshal:
            dfdl:
              schemaUri: X12-850.dfdl.xsd
        - setVariable:
            description: keep x12
            expression:
              simple:
                expression: ${body}
            name: x12
        - step:
            id: kaoto-datamapper-e6fb3e6b-4288
            steps:
              - to:
                  id: kaoto-datamapper-xslt-3598-1039
                  uri: xslt-saxon:kaoto-datamapper-e6fb3e6b-4288.xsl
                  parameters: {}
        - to:
            id: to-3910-2785
            uri: direct
            parameters:
              name: po-main
