<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Shop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- header ---- */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      color: #fff;
      padding: 2rem 1.5rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: "";
      position: absolute;
      top: -60%; left: -20%;
      width: 140%; height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(99,102,241,.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 30%, rgba(168,85,247,.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .header-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      background: rgba(255,255,255,.1);
      border-radius: 16px;
      margin-bottom: 0.75rem;
      backdrop-filter: blur(4px);
    }
    .header-icon svg { width: 28px; height: 28px; }
    header h1 { font-size: 1.6rem; letter-spacing: -0.02em; position: relative; }
    header p  { margin-top: 0.35rem; color: #94a3b8; font-size: 0.88rem; position: relative; }

    main {
      max-width: 640px;
      width: 100%;
      margin: -1rem auto 1.5rem;
      padding: 0 1rem;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    /* ---- basket card ---- */
    .basket {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .basket-header {
      padding: 1rem 1.25rem;
      font-weight: 700;
      font-size: 1rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .basket-header svg { width: 18px; height: 18px; color: #6366f1; }

    /* ---- item rows ---- */
    .item {
      display: grid;
      grid-template-columns: 56px 1fr 94px 70px;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.15s;
    }
    .item:hover { background: #fafbfc; }

    .item-thumb {
      width: 56px; height: 56px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .item-thumb svg { width: 30px; height: 30px; }

    .item-info { line-height: 1.4; min-width: 0; }
    .item-name { font-weight: 600; font-size: 0.88rem; }
    .item-sku  { font-size: 0.72rem; color: #a0aec0; margin-top: 2px; }
    .item-unit { font-size: 0.75rem; color: #718096; margin-top: 1px; }

    .item-price {
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
      width: 70px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ---- quantity stepper ---- */
    .qty {
      display: flex;
      align-items: center;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      background: #f8fafc;
      flex-shrink: 0;
    }
    .qty button {
      width: 30px; height: 30px;
      background: transparent;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: #4a5568;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }
    .qty button:hover { background: #edf2f7; }
    .qty span {
      width: 32px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      border-left: 1px solid #e2e8f0;
      border-right: 1px solid #e2e8f0;
      line-height: 30px;
      background: #fff;
    }

    /* ---- totals ---- */
    .totals {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.05rem;
      font-weight: 700;
      border-top: 2px solid #f1f5f9;
    }
    .totals .label { color: #64748b; }

    /* ---- buy button ---- */
    .buy-row { padding: 0 1.25rem 1.25rem; }
    .buy-btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .buy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99,102,241,.4);
    }
    .buy-btn:active { transform: translateY(0); }
    .buy-btn:disabled {
      background: #a0aec0;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .buy-btn svg { width: 18px; height: 18px; }

    /* ---- toast ---- */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: #1e293b;
      color: #fff;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.error { background: #dc2626; }
    .toast svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ---- edi preview ---- */
    /* ---- invoice result ---- */
    .invoice-result {
      margin-top: 1rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
      overflow: hidden;
      display: none;
    }
    .invoice-result.visible { display: block; animation: slideIn 0.35s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .invoice-header {
      padding: 1rem 1.25rem;
      font-weight: 700;
      font-size: 1rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #15803d;
    }
    .invoice-header svg { width: 20px; height: 20px; }
    .invoice-body {
      padding: 1.25rem;
      text-align: center;
    }
    .invoice-body p {
      font-size: 0.88rem;
      color: #64748b;
      margin-bottom: 1rem;
    }
    .invoice-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #15803d, #16a34a);
      color: #fff;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(22,163,74,.35);
    }
    .invoice-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(22,163,74,.4);
    }
    .invoice-link svg { width: 18px; height: 18px; }
    .invoice-filename {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #a0aec0;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      word-break: break-all;
    }

    /* ---- edi preview ---- */
    .edi-preview {
      margin-top: 1rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .edi-preview summary {
      padding: 0.85rem 1.25rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .edi-preview summary svg { width: 16px; height: 16px; }
    .edi-preview pre {
      padding: 0 1.25rem 1rem;
      font-size: 0.76rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-all;
      color: #334155;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      background: #f8fafc;
      margin: 0 0.75rem 0.75rem;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    /* ---- chat fab ---- */
    .chat-fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(14,165,233,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 5;
      text-decoration: none;
    }
    .chat-fab:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 24px rgba(14,165,233,.5);
    }
    .chat-fab svg { width: 26px; height: 26px; }
    .chat-fab .chat-tooltip {
      position: absolute;
      right: 64px;
      background: #1e293b;
      color: #fff;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .chat-fab .chat-tooltip::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -6px;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-color: #1e293b;
      border-right: none;
    }
    .chat-fab:hover .chat-tooltip { opacity: 1; }

    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    footer a { color: #6366f1; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
  </div>
  <h1>Test Shop</h1>
  <p>Your basket is ready &mdash; complete your purchase below</p>
</header>

<main>
  <div class="basket">
    <div class="basket-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      Shopping Basket
    </div>
    <div id="items"></div>
    <div class="totals">
      <span class="label">Total</span>
      <span id="total">$0.00</span>
    </div>
    <div class="buy-row">
      <button class="buy-btn" id="buyBtn" onclick="buy()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        Place Order
      </button>
    </div>
  </div>

  <div class="invoice-result" id="invoiceResult">
    <div class="invoice-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      Invoice Generated
    </div>
    <div class="invoice-body">
      <p>Your order has been processed and an invoice is ready.</p>
      <a class="invoice-link" id="invoiceLink" href="#" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        View Invoice (PDF)
      </a>
      <div class="invoice-filename" id="invoiceFilename"></div>
    </div>
  </div>

  <details class="edi-preview">
    <summary>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
      EDI X12 850 Preview
    </summary>
    <pre id="ediPreview"></pre>
  </details>
</main>

<a class="chat-fab" id="chatFab" href="#" target="_blank" title="Chat with Customer Support" style="display:none">
  <span class="chat-tooltip">Chat with Support</span>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    <line x1="9" y1="10" x2="9" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="15" y1="10" x2="15" y2="10"/>
  </svg>
</a>

<div class="toast" id="toast"></div>

<footer>
  Powered by <a href="https://camel.apache.org" target="_blank">Apache Camel</a>
</footer>

<script>
/* ---- inline SVG product illustrations ---- */
const icons = {
  WINEGLASS01: {
    bg: "#fef3f2",
    svg: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 8h16v4c0 8-5 14-8 16v12h-0v-12c-3-2-8-8-8-16V8z" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
      <rect x="22" y="52" width="20" height="3" rx="1.5" fill="#b91c1c"/>
      <line x1="32" y1="40" x2="32" y2="52" stroke="#b91c1c" stroke-width="2"/>
      <ellipse cx="32" cy="12" rx="7" ry="2" fill="#fca5a5" opacity=".5"/>
    </svg>`
  },
  DECANTER02: {
    bg: "#f0fdf4",
    svg: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M28 6h8v8l6 14c1 2 1 4 1 6v10a6 6 0 0 1-6 6H27a6 6 0 0 1-6-6V34c0-2 0-4 1-6l6-14V6z" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
      <rect x="27" y="4" width="10" height="4" rx="1" fill="#15803d"/>
      <ellipse cx="32" cy="38" rx="8" ry="4" fill="#86efac" opacity=".4"/>
      <path d="M24 30c4 2 12 2 16 0" stroke="#15803d" stroke-width="1.5" opacity=".5"/>
    </svg>`
  },
  CORKSCREW03: {
    bg: "#eff6ff",
    svg: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="30" y="6" width="4" height="20" rx="2" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1.5"/>
      <path d="M32 26c-2 3-4 5-4 8s2 6 4 8c2-2 4-5 4-8s-2-5-4-8z" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
      <path d="M32 42v12" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M26 54h12" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="32" cy="12" r="2" fill="#1d4ed8"/>
      <path d="M22 10h6M36 10h6" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round"/>
    </svg>`
  },
  COASTER04: {
    bg: "#faf5ff",
    svg: `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="32" cy="36" rx="20" ry="8" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>
      <ellipse cx="32" cy="32" rx="20" ry="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
      <ellipse cx="32" cy="32" rx="14" ry="5.5" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3 3"/>
      <ellipse cx="32" cy="32" rx="7" ry="2.5" fill="#ddd6fe" opacity=".6"/>
    </svg>`
  }
};

let orderPlaced = false;

const catalog = [
  { sku: "WINEGLASS01", name: "Wine Glasses Goblets Pair Clear Glass",  price: 12.00, qty: 0 },
  { sku: "DECANTER02",  name: "Crystal Wine Decanter 750ml",           price: 34.50, qty: 0 },
  { sku: "CORKSCREW03", name: "Stainless Steel Corkscrew",             price:  8.99, qty: 0 },
  { sku: "COASTER04",   name: "Marble Coaster Set (6 pack)",           price: 18.00, qty: 0 },
];

function render() {
  const container = document.getElementById("items");
  container.innerHTML = catalog.map((item, i) => {
    const icon = icons[item.sku];
    return `
    <div class="item">
      <div class="item-thumb" style="background:${icon.bg}">${icon.svg}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-unit">$${item.price.toFixed(2)} each</div>
        <div class="item-sku">${item.sku}</div>
      </div>
      <div class="qty">
        <button onclick="changeQty(${i}, -1)">&minus;</button>
        <span>${item.qty}</span>
        <button onclick="changeQty(${i}, 1)">+</button>
      </div>
      <div class="item-price">$${(item.price * item.qty).toFixed(2)}</div>
    </div>`;
  }).join("");

  const total = catalog.reduce((s, it) => s + it.price * it.qty, 0);
  document.getElementById("total").textContent = "$" + total.toFixed(2);
  document.getElementById("ediPreview").textContent = buildX12();

  const btn = document.getElementById("buyBtn");
  const hasItems = catalog.some(it => it.qty > 0);
  if (orderPlaced) {
    btn.disabled = false;
    btn.onclick = newOrder;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Start New Order';
  } else {
    btn.onclick = buy;
    btn.disabled = !hasItems;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Place Order';
  }
}

function changeQty(index, delta) {
  catalog[index].qty = Math.max(0, catalog[index].qty + delta);
  render();
}

/* ---- build EDI X12 850 Purchase Order ---- */
function pad(str, len) { return (str + " ".repeat(len)).slice(0, len); }

function buildX12() {
  const now  = new Date();
  const date = now.toISOString().slice(0,10).replace(/-/g,"");
  const time = String(now.getHours()).padStart(2,"0") + String(now.getMinutes()).padStart(2,"0");
  const poNum = String(Math.floor(Math.random() * 90000000) + 10000000);

  const lines = [];
  lines.push(`ISA*00*${pad("",10)}*00*${pad("",10)}*01*${pad("939988477",15)}*01*${pad("949849105",15)}*${date.slice(2)}*${time}*U*00401*000000001*0*P*:~`);
  lines.push(`GS*PO*939988477*949849105*${date}*${time}*1*X*004010~`);
  lines.push(`ST*850*0001~`);
  lines.push(`BEG*00*SA*${poNum}**${date}~`);
  lines.push(`N1*BY*Web Customer*91*939988477~`);
  lines.push(`N3*123 Demo Street~`);
  lines.push(`N4*Demoville*CA*90210~`);
  lines.push(`N1*SE*Test Shop Warehouse*91*949849105~`);
  lines.push(`N3*456 Warehouse Blvd~`);
  lines.push(`N4*Stockton*CA*95202~`);

  let segCount = 10;
  let totalQty = 0;
  let lineNum  = 0;

  catalog.forEach(item => {
    if (item.qty === 0) return;
    lineNum++;
    totalQty += item.qty;
    lines.push(`PO1*${lineNum}*${item.qty}*EA*${item.price.toFixed(2)}*QT*SK*${item.sku}~`);
    lines.push(`PID*F****${item.name}~`);
    segCount += 2;
  });

  const total = catalog.reduce((s, it) => s + it.price * it.qty, 0);
  lines.push(`CTT*${lineNum}*${totalQty}~`);
  lines.push(`AMT*TT*${total.toFixed(2)}~`);
  segCount += 4;
  lines.push(`SE*${segCount}*0001~`);
  lines.push(`GE*1*1~`);
  lines.push(`IEA*1*000000001~`);

  return lines.join("\n");
}

/* ---- send to Camel ---- */
async function buy() {
  const hasItems = catalog.some(it => it.qty > 0);
  if (!hasItems) { showToast("Add at least one item", true); return; }

  const btn = document.getElementById("buyBtn");
  btn.disabled = true;
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/></path></svg> Sending...';

  try {
    const resp = await fetch("/ingest/x12", {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: buildX12(),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const invoiceUrl = await resp.text();

    const resultDiv = document.getElementById("invoiceResult");
    const link = document.getElementById("invoiceLink");
    const filename = document.getElementById("invoiceFilename");

    link.href = invoiceUrl.trim();
    const match = invoiceUrl.match(/\/([^/?]+\.pdf)/i);
    filename.textContent = match ? match[1] : "invoice.pdf";

    resultDiv.classList.remove("visible");
    void resultDiv.offsetWidth;
    resultDiv.classList.add("visible");
    resultDiv.scrollIntoView({ behavior: "smooth", block: "center" });

    orderPlaced = true;
    showToast("Order processed! Invoice ready.", false);
  } catch (err) {
    showToast("Failed to send order: " + err.message, true);
  } finally {
    render();
  }
}

function newOrder() {
  catalog.forEach(item => item.qty = 0);
  orderPlaced = false;
  document.getElementById("invoiceResult").classList.remove("visible");
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showToast(msg, isError) {
  const t = document.getElementById("toast");
  const icon = isError
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
  t.innerHTML = icon + " " + msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => t.className = "toast", 3000);
}

render();

fetch("/api/config")
  .then(r => r.json())
  .then(cfg => {
    if (cfg.supportUrl) {
      const fab = document.getElementById("chatFab");
      fab.href = cfg.supportUrl;
      fab.style.display = "flex";
    }
  })
  .catch(() => {});
</script>
