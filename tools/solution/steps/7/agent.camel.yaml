- route:
    id: rocketchat-to-agent
    description: RocketChat to Agent
    from:
      description: RocketChat
      uri: platform-http
      parameters:
        path: /ai-support
      steps:
        - setBody:
            description: get text
            jq:
              expression: .text
              resultType: String
        - setHeaders:
            description: set system prompt
            disabled: true
            headers:
              - language:
                  expression: resource:system.message
                  language: simple
                name: CamelLangChain4jAgentSystemMessage
              - name: CamelLangChain4jAgentMemoryId
                simple:
                  expression: "1"
        - step:
            description: "To do: Agent"
            steps:
              - setBody:
                  description: Dummy response
                  simple:
                    expression: |-
                      {
                         "text": "Hello World"
                      }
        - to:
            description: to rocketchat
            uri: direct
            parameters:
              name: to-rocketchat

- route:
    id: tool-get-pdf
    description: Gets the PDF url of an invoice
    from:
      uri: langchain4j-tools
      parameters:
        description: Get the PDF url of an invoice
        parameter.id: string
        tags: all
        toolId: getInvoicePDFurl
      steps:
        - setVariable:
            description: set file name
            expression:
              simple:
                expression: invoice_${header.id}.pdf
            name: filename
        - to:
            id: to-1810
            uri: direct
            parameters:
              name: get-pdf-url
- route:
    id: get-pdf-url
    description: Retrieves the PDF url of an invoice
    from:
      uri: direct
      parameters:
        name: get-pdf-url
      steps:
        - removeHeaders:
            disabled: false
            pattern: "*"
        - to:
            uri: aws2-s3
            parameters:
              amazonS3Presigner: "#presigner"
              autoCreateBucket: true
              bucketNameOrArn: "{{s3.bucket}}"
              forcePathStyle: true
              keyName: ${variable.filename}
              operation: createDownloadLink
              overrideEndpoint: true
              region: us-east-1
        - log:
            message: "link: ${body}"
- route:
    id: to-rocketchat
    description: to-rocketchat
    from:
      id: from-1791
      uri: direct
      parameters:
        name: to-rocketchat
      steps:
        - unmarshal:
            disabled: false
            json: {}
        - marshal:
            disabled: false
            json: {}
- route:
    id: tool-amend-invoice
    description: Amend invoice
    from:
      uri: langchain4j-tools
      parameters:
        description: Amends an invoice
        parameter.id: string
        parameter.prompt: string
        tags: all
        toolId: amendInvoice
      steps:
        - step:
            id: step-3889
            description: normal flow
            steps:
              - setVariable:
                  description: set file name
                  expression:
                    simple:
                      expression: invoice_${header.id}.pdf
                  name: filename
              - to:
                  id: to-1810-2640
                  uri: direct
                  parameters:
                    name: get-invoice-data
              - setBody:
                  id: setBody-4119
                  simple:
                    expression: |-
                      ${header.prompt}

                      ${body}
              - setHeaders:
                  id: setHeaders-3420-2534
                  description: set system prompt
                  disabled: false
                  headers:
                    - language:
                        expression: resource:prompt.amend
                        language: simple
                      name: CamelLangChain4jAgentSystemMessage
                    - name: CamelLangChain4jAgentMemoryId
                      simple:
                        expression: "1"
              - to:
                  id: to-2739
                  uri: langchain4j-agent
                  parameters:
                    agentId: amend
                    agent: "#amend"
              - setBody:
                  id: setBody-1842
                  simple:
                    expression: ${body.trim()}
                  disabled: true
              - setVariable:
                  id: setVariable-3622
                  name: summary
                  xpath:
                    expression: /Amendment/Summary/text()
                    saxon: true
                  description: get summary
              - setBody:
                  id: setBody-1842-3654
                  xpath:
                    expression: /Amendment/Content/Invoice
                    saxon: true
              - convertBodyTo:
                  id: convertBodyTo-1103
                  type: String
              - log:
                  id: log-1389
                  message: "summary: ${variable.summary}\\n${body}"
              - to:
                  uri: sql
                  parameters:
                    query: >-
                      INSERT INTO invoices (id, data) VALUES
                      (:#${header.id},:#${body})

                      ON CONFLICT (id)

                      DO UPDATE SET data = EXCLUDED.data
              - to:
                  id: to-1542
                  uri: direct
                  parameters:
                    name: store-pdf-s3
                  disabled: false
              - setBody:
                  id: setBody-3423
                  simple:
                    expression: >-
                      {
                        "status":"done",
                        "summary":  "${variable.summary}",
                        "actions":"1) Inform the user with 'The database records have been updated'. 2) Provide summary. 3) Ask if they'd like to see the new PDF invoice."
                      }
            disabled: false
- route:
    id: get-invoice-data
    description: get-invoice-data
    from:
      id: from-1847
      uri: direct
      parameters:
        name: get-invoice-data
      steps:
        - convertHeaderTo:
            id: convertHeaderTo-9760
            name: id
            type: String
        - to:
            id: to-1530
            uri: sql
            parameters:
              query: select data from invoices where id = :#${header.id}
        - setBody:
            id: setBody-1160
            simple:
              expression: ${body[0]}
            disabled: true
        - unmarshal:
            id: unmarshal-1434
            jacksonXml: {}
            disabled: true
        - marshal:
            id: marshal-4078
            jacksonXml: {}
            disabled: true
        - log:
            id: log-1096
            message: ${body}
- route:
    id: tool-get-data
    description: Get invoice data
    from:
