      uri: langchain4j-tools
      parameters:
        description: Obtains data about an invoice from the database
        tags: db
        toolId: getInvoiceData
        parameter.id: string
      steps:
        - to:
            id: to-1810-2640-3288
            uri: direct
            parameters:
              name: get-invoice-data
- route:
    id: tool-create-ticket
    description: Creates a ticket in HelpDesk
    from:
      id: tool-create-ticket
      uri: langchain4j-tools
      parameters:
        description: Creates an issue or ticket in the HelpDesk system
        parameter.subject: string
        parameter.content: string
        parameter."invoiceUrl: (optional) string
        tags: all
        toolId: createTicket
      steps:
        - setBody:
            simple: >-
              {
                "subject": "${header.subject}",
                "issue": "${header.content}<br><br>[📄 View Invoice PDF](${header.invoiceUrl})"
              }
            description: set JSON call
        - to:
            uri: kamelet:helpdesk-create-ticket
            parameters:
              username: "{{helpdesk.username}}"
              password: "{{helpdesk.password}}"
              groupId: "{{helpdesk.group.id}}"
              typeId: "{{helpdesk.type.id.issue}}"
              priorityId: "{{helpdesk.priority.id.normal}}"
            description: Create helpdesk ticket
        - setBody:
            simple:
              expression: >-
                {
                  "status": "done",
                  "ticket-id": "${jq(.ticket.uid)}",
                  "actions": "1) Do not share the ticket with the customer. 2) Prompt the user with: 'Would you like to share this ticket with the customer?"
                }
        - log:
            message: Ticket created
            description: Log result
- route:
    id: store-pdf-s3
    from:
      uri: direct
      parameters:
        name: store-pdf-s3
      steps:
        - to:
            description: Template PDF
            uri: xslt-saxon
            parameters:
              resourceUri: template-pdf.xsl
        - process:
            description: generate PDF
            ref: InvoiceToPDF
        - to:
            description: store PDF
            uri: aws2-s3
            parameters:
              autoCreateBucket: true
              bucketNameOrArn: "{{s3.bucket}}"
              forcePathStyle: true
              keyName: invoice_${header.id}.pdf
              overrideEndpoint: true
              region: us-east-1
- route:
    id: tool-share-ticket
    description: Shares a ticket with customer
    from:
      id: tool-share-ticket
      uri: langchain4j-tools
      parameters:
        description: Shares a ticket created in HelpDesk with customer
        parameter.ticketId: string
        tags: all
        toolId: shareTicket
      steps:
        - log:
            message: ${body}
        - setBody:
            simple:
              expression: >-
                {
                  "timesptamp":"${date:now}",
                  "source":"rocketchat",
                  "user":"ai",
                  "text":"<br><br><a href=\"{{helpdesk.url}}\">📄 Ticket <b>#${header.ticketId}</b></a> created.<br>(Click to open in HelpDesk)"
                }
        - to:
            uri: kafka
            parameters:
              topic: myroom
              brokers: my-cluster-kafka-bootstrap:9092
        - setBody:
            simple:
              expression: >-
                {
                  "status": "success",
                  "details": "ticket  #${header.ticketId} was sent to customer channel with link to HelpDesk"
                }
